name: Release sdkmate

# 触发条件：
# 1. push 代码到 master 分支 -> release-please 自动创建 Release PR
# 2. Release PR 合并后自动打 tag 并发 Release
# 3. 使用 conventional commits 规范 (feat:, fix:, docs:, chore: 等)
on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
    types: [closed]

jobs:
  # 跨平台构建任务
  # 构建在 tag push 时触发（由 release-please 创建的 tag）
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: sdkm
            asset_name: sdkmate-linux-x86_64
            archive_format: tar.gz
            system_deps: ""
            asset_name_without_exe: ""
          # macOS x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: sdkm
            asset_name: sdkmate-macos-x86_64
            archive_format: tar.gz
            system_deps: ""
            asset_name_without_exe: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: sdkm
            asset_name: sdkmate-macos-aarch64
            archive_format: tar.gz
            system_deps: ""
            asset_name_without_exe: ""
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: sdkm.exe
            asset_name: sdkmate-windows-x86_64.exe
            asset_name_without_exe: sdkmate-windows-x86_64
            archive_format: zip
            system_deps: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest' && matrix.system_deps != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.system_deps }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Add Rust target (macOS cross-compile)
        if: matrix.os == 'macos-latest'
        run: rustup target add ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Strip binary (非Windows平台)
        if: matrix.os != 'windows-latest'
        run: |
          strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-artifacts
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "release-artifacts/${{ matrix.artifact_name }}"
          if [ "${{ matrix.archive_format }}" = "tar.gz" ]; then
            tar -czf "release-artifacts/${{ matrix.asset_name }}.tar.gz" -C release-artifacts "${{ matrix.artifact_name }}"
          else
            7z a -tzip "release-artifacts/${{ matrix.asset_name_without_exe }}.zip" ./release-artifacts/*
          fi
          echo "生成的文件列表："
          ls -la release-artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            release-artifacts/${{ matrix.asset_name_without_exe != '' && matrix.asset_name_without_exe || matrix.asset_name }}.${{ matrix.archive_format }}
          if-no-files-found: error

  # release-please 自动检测 conventional commits 并管理版本
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      release_name: ${{ steps.release.outputs.release-name }}
      release_body: ${{ steps.release.outputs.release-body }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes and manage version
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: rust
          target-commitish: master
          fork: false
          changelog-types: |
            [
              { "type": "feat", "section": "Features", "hidden": false },
              { "type": "fix", "section": "Bug Fixes", "hidden": false },
              { "type": "perf", "section": "Performance Improvements", "hidden": false },
              { "type": "refactor", "section": "Code Refactoring", "hidden": false },
              { "type": "docs", "section": "Documentation", "hidden": false },
              { "type": "build", "section": "Build System", "hidden": false },
              { "type": "ci", "section": "CI/CD", "hidden": false },
              { "type": "chore", "section": "Other Changes", "hidden": false }
            ]

  # 发布任务 - 只在 release-please 创建 release 后执行
  release:
    needs: [build, release-please]
    runs-on: ubuntu-latest
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.release-please.outputs.release_name }}
          body: ${{ needs.release-please.outputs.release_body }}
          draft: false
          prerelease: false
          files: |
            *.tar.gz
            *.zip

      - name: Notify on success
        if: success()
        run: |
          echo "Successfully created release ${{ github.ref_name }}"

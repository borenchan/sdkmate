<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>

    <!-- Logo 主体渐变 -->
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:1" />
    </linearGradient>

    <!-- 闪电渐变 -->
    <linearGradient id="boltGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>

    <!-- 发光效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 阴影效果 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect x="10" y="10" width="380" height="380" rx="40" ry="40" fill="url(#bgGradient)" stroke="url(#logoGradient)" stroke-width="3"/>

  <!-- 背景装饰圆环 -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="url(#logoGradient)" stroke-width="1" opacity="0.3"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="url(#logoGradient)" stroke-width="1" opacity="0.2"/>
  <circle cx="200" cy="200" r="120" fill="none" stroke="url(#logoGradient)" stroke-width="1" opacity="0.1"/>

  <!-- 主图形：抽象的 "M" 形状，代表 Mate -->
  <g filter="url(#shadow)">
    <!-- 左侧弧线 -->
    <path d="M 80 280 Q 80 140 140 120 L 160 115 L 170 160 Q 160 170 150 180 L 130 200 Q 120 210 120 240 L 120 280"
          fill="none" stroke="url(#logoGradient)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- 中间闪电符号 -->
    <path d="M 185 100 L 210 160 L 195 160 L 220 240 L 185 170 L 200 170 L 175 100 Z"
          fill="url(#boltGradient)" filter="url(#glow)"/>

    <!-- 右侧弧线 -->
    <path d="M 240 280 L 240 200 Q 240 160 270 140 L 300 120 Q 320 115 320 280"
          fill="none" stroke="url(#logoGradient)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 顶部装饰线 -->
  <line x1="80" y1="300" x2="200" y2="300" stroke="url(#logoGradient)" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="300" x2="320" y2="300" stroke="url(#logoGradient)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- 底部文字背景 -->
  <rect x="80" y="315" width="240" height="50" rx="10" ry="10" fill="url(#logoGradient)" opacity="0.1"/>

  <!-- sdkmate 文字 -->
  <text x="200" y="350" font-family="'Segoe UI', 'Arial', sans-serif" font-size="36" font-weight="bold" fill="url(#logoGradient)" text-anchor="middle" letter-spacing="4">SDKMATE</text>

  <!-- 装饰性圆点 -->
  <circle cx="60" cy="60" r="6" fill="#00d4ff" opacity="0.8"/>
  <circle cx="340" cy="60" r="4" fill="#7c3aed" opacity="0.8"/>
  <circle cx="60" cy="340" r="4" fill="#f472b6" opacity="0.8"/>
  <circle cx="340" cy="340" r="6" fill="#00d4ff" opacity="0.8"/>
</svg>
